<style>
  :root {
    --bg: #1C1B1A;
    --surface: #26241F;
    --border: #33312A;
    --text: #EDE9E1;
    --text-dim: #8A8578;
    --text-faint: #6B675C;
    --push: #E8734A;
    --pull: #4A9E8E;
    --legs: #C9A227;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing:antialiased; }
  .mono { font-family: "SF Mono", "Menlo", "Consolas", monospace; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 32px 20px 100px; }
  h1 { font-family: -apple-system, sans-serif; font-weight: 900; font-size: 28px;
    letter-spacing: -0.5px; margin: 0 0 12px; }
  h1 .slash { color: #4A473F; margin: 0 4px; }
  .streak { display:flex; align-items:center; gap:6px; height:24px; flex-wrap: wrap; }
  .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .empty-note { font-size:12px; color: var(--text-faint); }
  .tabs { display:flex; gap:4px; background:var(--surface); border-radius:10px; padding:4px; margin:24px 0; }
  .tab { flex:1; padding:10px; border:0; border-radius:8px; background:transparent; color:var(--text-dim);
    font-size:14px; font-weight:500; cursor:pointer; }
  .tab.active { background:#33312A; color:var(--text); }
  .type-row { display:flex; gap:8px; margin-bottom:16px; }
  .type-btn { flex:1; padding:10px; border-radius:10px; font-size:14px; font-weight:600;
    background:transparent; border:1px solid var(--border); color:var(--text-dim); cursor:pointer; }
  .date-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .date-row label { font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-dim); }
  input[type=date] { background:var(--surface); border:1px solid var(--border); border-radius:6px;
    padding:6px 8px; color:var(--text); font-size:14px; }
  .ex-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:12px; }
  .ex-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .ex-name { font-size:14px; font-weight:500; }
  .ex-target { font-size:11px; color:var(--text-faint); font-weight:500; }
  .howto-toggle { display:flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:var(--text-faint);
    background:none; border:0; cursor:pointer; padding:0 0 8px; }
  .howto-text { font-size:12.5px; line-height:1.5; color:var(--text-dim); margin:0 0 12px; padding-bottom:12px;
    border-bottom:1px solid var(--border); }
  .plan-day { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--surface);
    border:1px solid var(--border); border-radius:8px; margin-bottom:6px; }
  .plan-day-name { font-size:13px; font-weight:600; width:36px; color:var(--text-dim); }
  .plan-day-label { font-size:14px; }
  .progression-box { margin-top:20px; padding:14px; background:var(--surface); border:1px solid var(--border);
    border-radius:10px; font-size:13px; line-height:1.5; color:var(--text-dim); }
  .progression-title { font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-faint);
    margin-bottom:6px; font-weight:600; }
  .icon-btn { background:none; border:0; color:var(--text-faint); cursor:pointer; padding:2px; }
  .set-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .set-idx { font-size:11px; color:var(--text-faint); width:16px; }
  .set-x { color:#4A473F; font-size:12px; }
  input.num { width:60px; background:var(--bg); border:1px solid var(--border); border-radius:6px;
    padding:6px 8px; font-size:14px; color:var(--text); }
  .add-set { margin-top:6px; font-size:12px; font-weight:600; background:none; border:0; cursor:pointer;
    display:flex; align-items:center; gap:4px; }
  .add-ex-row { display:flex; gap:8px; margin-bottom:24px; }
  .add-ex-row input { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:10px 12px; font-size:14px; color:var(--text); }
  .add-ex-row button { padding:0 14px; border-radius:8px; border:1px solid var(--border); background:none; color:var(--text-dim); cursor:pointer; }
  .save-btn { width:100%; padding:14px; border:0; border-radius:10px; font-weight:700; font-size:15px;
    color:#1C1B1A; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .session-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:12px; overflow:hidden; }
  .session-head { width:100%; display:flex; align-items:center; justify-content:space-between; padding:12px 16px;
    background:none; border:0; cursor:pointer; color:var(--text); text-align:left; }
  .session-info { display:flex; align-items:center; gap:12px; }
  .session-type { font-size:14px; font-weight:600; }
  .session-meta { font-size:12px; color:var(--text-faint); }
  .session-body { padding: 0 16px 16px; border-top:1px solid var(--border); }
  .ex-detail { margin-top:12px; }
  .ex-detail-name { font-size:14px; font-weight:500; margin-bottom:6px; }
  .set-chip { font-size:12px; padding:2px 8px; border-radius:4px; background:var(--bg); color:#B8B4A8; margin:0 6px 6px 0; display:inline-block; }
  .del-btn { font-size:12px; color:var(--text-dim); background:none; border:0; cursor:pointer; margin-top:8px; padding:0;}
  .empty-history { text-align:center; padding:60px 0; color:var(--text-faint); font-size:14px; }
  .toast { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:#B85C3A; color:white;
    font-size:12px; padding:8px 14px; border-radius:8px; opacity:0; transition:opacity .3s; pointer-events:none; }
  .toast.show { opacity:1; }
  svg { display:block; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const TYPES = {
  push: { label: "Push", accent: "#E8734A", defaults: [
    {name:"DB Bench Press", target:"3x6–10"},
    {name:"Incline DB Press", target:"3x8–12"},
    {name:"Seated DB Shoulder Press", target:"3x8–12"},
    {name:"Lateral Raises", target:"3x12–15"},
    {name:"Cable Triceps Pushdown", target:"3x10–15"},
    {name:"Overhead Triceps Extension", target:"2x10–15"},
  ]},
  pull: { label: "Pull", accent: "#4A9E8E", defaults: [
    {name:"Lat Pulldown", target:"3x8–12"},
    {name:"Chest-Supported Row", target:"3x8–12"},
    {name:"Seated Cable Row", target:"3x10–12"},
    {name:"Face Pulls", target:"3x12–15"},
    {name:"DB Hammer Curl", target:"3x10–12"},
    {name:"EZ Bar Curl", target:"2x10–12"},
  ]},
  legs: { label: "Legs", accent: "#C9A227", defaults: [
    {name:"Squat or Leg Press", target:"3x6–10"},
    {name:"Romanian Deadlift", target:"3x8–10"},
    {name:"Walking Lunges", target:"2x10 each leg"},
    {name:"Leg Curl", target:"3x10–15"},
    {name:"Leg Extension", target:"2x12–15"},
    {name:"Standing Calf Raise", target:"4x12–15"},
    {name:"Hanging Leg Raises", target:"3 sets"},
  ]},
};

const SCHEDULE = [
  {day:"Mon", type:"push"}, {day:"Tue", type:"pull"}, {day:"Wed", type:"legs"},
  {day:"Thu", type:null, label:"Rest or light cardio"},
  {day:"Fri", type:"push"}, {day:"Sat", type:"pull"}, {day:"Sun", type:"legs", label:"Legs or Rest"},
];
const PROGRESSION_NOTE = "Train 1–2 reps short of failure on compound lifts. When you reach the top of the rep range for all sets with good form, increase the weight by the smallest increment next session.";

const HOW_TO = {
  "DB Bench Press": "Lie on a flat bench holding a dumbbell in each hand at chest level, palms facing forward. Press both dumbbells up until your arms are extended, then lower with control until the dumbbells are level with your chest. Keep your feet flat on the floor and shoulder blades pulled back throughout.",
  "Incline DB Press": "Set a bench to a 30–45° incline. Press the dumbbells up from shoulder height until arms are extended above your upper chest, then lower slowly back down. Avoid flaring elbows out too wide to protect the shoulders.",
  "Seated DB Shoulder Press": "Sit with back supported, dumbbells at shoulder height with palms facing forward. Press overhead until arms are extended without locking out hard, then lower back to shoulder height. Keep your core braced so you don't arch your lower back.",
  "Lateral Raises": "Stand holding a dumbbell in each hand at your sides. With a slight bend in the elbows, raise both arms out to the sides until roughly shoulder height, then lower slowly. Lead with the elbows, not the wrists, and avoid using momentum.",
  "Cable Triceps Pushdown": "Stand facing a cable machine with a bar or rope attachment set high. Keep elbows tucked at your sides and push the attachment down until arms are fully extended, then return with control. Only your forearms should move.",
  "Overhead Triceps Extension": "Hold a single dumbbell with both hands overhead, arms extended. Lower it behind your head by bending the elbows, keeping upper arms close to your ears, then extend back up. Keep the movement slow to avoid straining the elbows.",
  "Lat Pulldown": "Sit at the machine with thighs secured, grip the bar wider than shoulder width. Pull the bar down to your upper chest while squeezing your shoulder blades together, then let it rise back up under control. Avoid leaning back excessively.",
  "Chest-Supported Row": "Lie chest-down on an incline bench holding dumbbells or a handle attachment. Row the weight toward your torso by driving elbows back, squeezing shoulder blades together, then lower with control. The support prevents momentum from your lower back.",
  "Seated Cable Row": "Sit at the row machine with knees slightly bent, grip the handle with arms extended. Pull the handle to your torso while keeping your back straight, then extend arms back out. Avoid rounding your lower back at the stretch.",
  "Face Pulls": "Set a cable at upper-chest to head height with a rope attachment. Pull the rope toward your face, splitting your hands apart and driving elbows high and back, then return slowly. Focus on squeezing the rear shoulders together.",
  "DB Hammer Curl": "Stand holding dumbbells at your sides with palms facing your body (neutral grip). Curl the weights up toward your shoulders keeping elbows pinned to your sides, then lower with control. Avoid swinging your torso.",
  "EZ Bar Curl": "Hold an EZ curl bar with an underhand grip on the angled portions. Curl the bar up toward your shoulders keeping elbows fixed at your sides, then lower slowly back to full extension. Keep your torso still throughout.",
  "Squat or Leg Press": "For squats: bar on your upper back, feet shoulder-width apart, sit back and down until thighs are at least parallel to the floor, then drive back up through your heels. For leg press: feet shoulder-width on the platform, lower until knees reach about 90°, then press back up without locking knees hard.",
  "Romanian Deadlift": "Hold a barbell or dumbbells in front of your thighs. With a slight knee bend, hinge at the hips and lower the weight along your legs until you feel a stretch in your hamstrings, then drive your hips forward to stand back up. Keep your back flat throughout.",
  "Walking Lunges": "Hold dumbbells at your sides or a bar on your back. Step forward into a lunge, lowering your back knee toward the floor, then push off to bring your back leg forward into the next step. Keep your torso upright and knee tracking over your toes.",
  "Leg Curl": "Lie face down (or sit, depending on machine) with the pad against your lower legs. Curl your heels toward your glutes by bending the knees, then lower back down with control. Avoid lifting your hips off the pad.",
  "Leg Extension": "Sit in the machine with the pad resting on your shins, knees bent at 90°. Extend your legs until nearly straight, squeezing the quads at the top, then lower back down slowly. Avoid locking the knees hard or using momentum.",
  "Standing Calf Raise": "Stand on a raised platform or machine with the balls of your feet on the edge. Rise up onto your toes as high as possible, pause briefly, then lower your heels below platform level for a full stretch. Keep the movement slow and controlled.",
  "Hanging Leg Raises": "Hang from a pull-up bar with arms fully extended. Raise your legs (straight or bent at the knees) up toward your chest by curling your pelvis, then lower back down with control. Avoid swinging — let your abs do the work, not momentum.",
};

const STORAGE_KEY = "ppl-sessions-v1";
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const todayISO = () => new Date().toISOString().slice(0,10);
const fmtDate = (iso) => new Date(iso+"T00:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"});

let sessions = [];
try { sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch(e) { sessions = []; }

let state = {
  view: "log",
  dayType: "push",
  date: todayISO(),
  exercises: makeDraft("push"),
  newExName: "",
  expandedId: null,
  infoOpenId: null,
};

function makeDraft(type) {
  return TYPES[type].defaults.map(d => ({ id: uid(), name: d.name, target: d.target, sets:[{weight:"",reps:""}] }));
}

function persist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
  } catch(e) {
    showToast();
  }
}

function showToast() {
  const t = document.getElementById("toast");
  if (!t) return;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2500);
}

function icon(name, size=16) {
  const icons = {
    plus: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`,
    x: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>`,
    check: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`,
    chevDown: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>`,
    chevUp: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg>`,
  };
  return icons[name] || "";
}

function render() {
  const app = document.getElementById("app");
  const t = TYPES[state.dayType];
  const streak = sessions.slice(0,12).reverse();

  let html = `
    <h1>
      <span style="color:${TYPES.push.accent}">PUSH</span><span class="slash">/</span>
      <span style="color:${TYPES.pull.accent}">PULL</span><span class="slash">/</span>
      <span style="color:${TYPES.legs.accent}">LEGS</span>
    </h1>
    <div class="streak">
      ${streak.length === 0
        ? `<span class="empty-note mono">no sessions logged yet</span>`
        : streak.map(s => `<div class="dot" style="background:${TYPES[s.type].accent}" title="${TYPES[s.type].label} · ${fmtDate(s.date)}"></div>`).join("")}
    </div>

    <div class="tabs">
      <button class="tab ${state.view==='log'?'active':''}" data-action="setView" data-view="log">New session</button>
      <button class="tab ${state.view==='history'?'active':''}" data-action="setView" data-view="history">History</button>
      <button class="tab ${state.view==='plan'?'active':''}" data-action="setView" data-view="plan">Plan</button>
    </div>
  `;

  if (state.view === "log") {
    html += `<div class="type-row">`;
    for (const [key, val] of Object.entries(TYPES)) {
      const active = state.dayType === key;
      html += `<button class="type-btn" data-action="switchType" data-type="${key}"
        style="border-color:${active?val.accent:'#33312A'}; background:${active?val.accent+'22':'transparent'}; color:${active?val.accent:'#8A8578'}">
        ${val.label}</button>`;
    }
    html += `</div>`;

    html += `
      <div class="date-row">
        <label>Date</label>
        <input type="date" id="dateInput" value="${state.date}" />
      </div>
    `;

    for (const ex of state.exercises) {
      const infoOpen = state.infoOpenId === ex.id;
      html += `<div class="ex-card">
        <div class="ex-head">
          <span class="ex-name">${escapeHtml(ex.name)}${ex.target ? ` <span class="ex-target mono">${ex.target}</span>` : ""}</span>
          <button class="icon-btn" data-action="removeExercise" data-id="${ex.id}">${icon('x',14)}</button>
        </div>
        <button class="howto-toggle" data-action="toggleInfo" data-id="${ex.id}">
          How to perform ${infoOpen ? icon('chevUp',12) : icon('chevDown',12)}
        </button>
        ${infoOpen ? `<p class="howto-text">${escapeHtml(HOW_TO[ex.name] || "No description available for this exercise yet.")}</p>` : ""}`;
      ex.sets.forEach((s, i) => {
        html += `<div class="set-row">
          <span class="set-idx mono">${i+1}</span>
          <input class="num mono" inputmode="decimal" placeholder="kg" value="${s.weight}" data-action="updateSet" data-exid="${ex.id}" data-idx="${i}" data-field="weight" />
          <span class="set-x">×</span>
          <input class="num mono" inputmode="numeric" placeholder="reps" value="${s.reps}" data-action="updateSet" data-exid="${ex.id}" data-idx="${i}" data-field="reps" />
          ${ex.sets.length>1 ? `<button class="icon-btn" style="margin-left:auto" data-action="removeSet" data-exid="${ex.id}" data-idx="${i}">${icon('x',12)}</button>` : ""}
        </div>`;
      });
      html += `<button class="add-set" style="color:${t.accent}" data-action="addSet" data-exid="${ex.id}">${icon('plus',12)} add set</button>`;
      html += `</div>`;
    }

    html += `
      <div class="add-ex-row">
        <input id="newExInput" placeholder="add exercise…" value="${escapeHtml(state.newExName)}" />
        <button data-action="addExercise">${icon('plus',16)}</button>
      </div>
      <button class="save-btn" style="background:${t.accent}" data-action="saveSession">${icon('check',16)} Save ${t.label.toLowerCase()} session</button>
    `;
  } else if (state.view === "plan") {
    html += `<div>`;
    for (const d of SCHEDULE) {
      const st = d.type ? TYPES[d.type] : null;
      html += `<div class="plan-day">
        <span class="plan-day-name mono">${d.day}</span>
        ${st ? `<div class="dot" style="background:${st.accent}"></div>` : `<div class="dot" style="background:#4A473F"></div>`}
        <span class="plan-day-label">${d.label ? d.label : st.label}</span>
      </div>`;
    }
    html += `<div class="progression-box">
      <div class="progression-title">Progression</div>
      ${PROGRESSION_NOTE}
    </div>`;
    html += `</div>`;
  } else {
    if (sessions.length === 0) {
      html += `<div class="empty-history">Nothing logged yet — your first session starts the streak.</div>`;
    } else {
      for (const s of sessions) {
        const st = TYPES[s.type];
        const open = state.expandedId === s.id;
        const totalSets = s.exercises.reduce((n,e)=>n+e.sets.length,0);
        html += `<div class="session-card">
          <button class="session-head" data-action="toggleExpand" data-id="${s.id}">
            <div class="session-info">
              <div class="dot" style="background:${st.accent}"></div>
              <div>
                <div class="session-type">${st.label}</div>
                <div class="session-meta mono">${fmtDate(s.date)} · ${s.exercises.length} exercises · ${totalSets} sets</div>
              </div>
            </div>
            ${open ? icon('chevUp',16) : icon('chevDown',16)}
          </button>`;
        if (open) {
          html += `<div class="session-body">`;
          s.exercises.forEach(e => {
            html += `<div class="ex-detail">
              <div class="ex-detail-name">${escapeHtml(e.name)}</div>
              <div>${e.sets.map(set=>`<span class="set-chip mono">${set.weight}×${set.reps}</span>`).join("")}</div>
            </div>`;
          });
          html += `<button class="del-btn" data-action="deleteSession" data-id="${s.id}">Delete session</button>`;
          html += `</div>`;
        }
        html += `</div>`;
      }
    }
  }

  html += `<div class="toast" id="toast">Couldn't save — storage may be full or blocked.</div>`;
  app.innerHTML = html;

  const dateInput = document.getElementById("dateInput");
  if (dateInput) dateInput.addEventListener("change", e => { state.date = e.target.value; });
  const newExInput = document.getElementById("newExInput");
  if (newExInput) {
    newExInput.addEventListener("input", e => { state.newExName = e.target.value; });
    newExInput.addEventListener("keydown", e => { if (e.key === "Enter") addExercise(); });
  }
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

function switchType(type) {
  state.dayType = type;
  state.exercises = makeDraft(type);
  render();
}

function addExercise() {
  const name = (state.newExName || "").trim();
  if (!name) return;
  state.exercises.push({ id: uid(), name, sets:[{weight:"",reps:""}] });
  state.newExName = "";
  render();
}

function removeExercise(id) {
  state.exercises = state.exercises.filter(e => e.id !== id);
  render();
}

function addSet(exId) {
  const ex = state.exercises.find(e => e.id === exId);
  if (ex) ex.sets.push({weight:"",reps:""});
  render();
}

function removeSet(exId, idx) {
  const ex = state.exercises.find(e => e.id === exId);
  if (ex) ex.sets.splice(idx,1);
  render();
}

function updateSet(exId, idx, field, value) {
  const ex = state.exercises.find(e => e.id === exId);
  if (ex) ex.sets[idx][field] = value;
  // no full render needed to avoid losing focus; update in place next render only on blur-triggering actions
}

function saveSession() {
  const cleaned = state.exercises.map(e => ({
    name: e.name,
    sets: e.sets.filter(s => s.weight !== "" || s.reps !== "").map(s => ({ weight: Number(s.weight)||0, reps: Number(s.reps)||0 }))
  })).filter(e => e.sets.length > 0);

  if (cleaned.length === 0) return;

  const session = { id: uid(), date: state.date, type: state.dayType, exercises: cleaned, loggedAt: Date.now() };
  sessions = [session, ...sessions].sort((a,b) => a.date < b.date ? 1 : -1);
  persist();
  state.exercises = makeDraft(state.dayType);
  state.view = "history";
  render();
}

function deleteSession(id) {
  sessions = sessions.filter(s => s.id !== id);
  persist();
  render();
}

document.addEventListener("click", (e) => {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.dataset.action;
  if (action === "setView") { state.view = el.dataset.view; render(); }
  else if (action === "switchType") switchType(el.dataset.type);
  else if (action === "addExercise") addExercise();
  else if (action === "removeExercise") removeExercise(el.dataset.id);
  else if (action === "addSet") addSet(el.dataset.exid);
  else if (action === "removeSet") { removeSet(el.dataset.exid, Number(el.dataset.idx)); }
  else if (action === "saveSession") saveSession();
  else if (action === "toggleExpand") { state.expandedId = state.expandedId === el.dataset.id ? null : el.dataset.id; render(); }
  else if (action === "toggleInfo") { state.infoOpenId = state.infoOpenId === el.dataset.id ? null : el.dataset.id; render(); }
  else if (action === "deleteSession") { if (confirm("Delete this session?")) deleteSession(el.dataset.id); }
});

document.addEventListener("input", (e) => {
  if (e.target.dataset.action === "updateSet") {
    updateSet(e.target.dataset.exid, Number(e.target.dataset.idx), e.target.dataset.field, e.target.value);
  }
});

render();
</script>
</body>
</html>
